# /etc/nginx/sites-available/discord-panel
# Symlink: sudo ln -s /etc/nginx/sites-available/discord-panel /etc/nginx/sites-enabled/

# Rate limiting zóny
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;

server {
    listen 80;
    server_name panel.rutterle.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name panel.rutterle.eu;

    # SSL – certbot vyplní automaticky
    ssl_certificate     /etc/letsencrypt/live/panel.rutterle.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.rutterle.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Bezpečnostní hlavičky
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            "no-referrer"                         always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" always;

    # Login – přísný rate limit
    location /auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpointy
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeout pro velké obrázky (avatar upload)
        proxy_read_timeout 60s;
    }

    # Zbytek (panel, auth/check, auth/logout)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
